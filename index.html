
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}

/* ── 뷰 전환 ── */
.view{display:none}.view.active{display:block}

/* ── 리스트 뷰 ── */
.topbar{padding:1.25rem 0 0}
.topbar-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:1rem}
.brand{font-size:18px;font-weight:500;color:var(--color-text-primary);letter-spacing:-0.01em}
.brand span{color:#1D9E75}
.tagline{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.stats-row{display:flex;gap:8px}
.stat{background:var(--color-background-secondary);border-radius:8px;padding:6px 12px;text-align:center}
.stat-n{font-size:15px;font-weight:500}
.stat-l{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.filter-section{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);min-width:28px;letter-spacing:0.04em;text-transform:uppercase}
.month-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.month-row::-webkit-scrollbar{display:none}
.mchip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all 0.12s}
.mchip.on{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:500}
.chip{padding:5px 13px;border-radius:20px;border:0.5px solid var(--color-border-secondary);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all 0.12s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.chip:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.chip.on{font-weight:500}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chip[data-c="전체"].on{background:#f0f0ee;border-color:#888;color:#333}
.chip[data-c="아시아"].on{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.chip[data-c="유럽"].on{background:#EEEDFE;border-color:#534AB7;color:#26215C}
.chip[data-c="아메리카"].on{background:#FAEEDA;border-color:#BA7517;color:#412402}
.chip[data-c="오세아니아"].on{background:#E6F1FB;border-color:#378ADD;color:#042C53}
.chip[data-c="아프리카"].on{background:#FAECE7;border-color:#D85A30;color:#4A1B0C}
.map-wrap{border-radius:12px;border:0.5px solid var(--color-border-tertiary);overflow:hidden;margin-bottom:1rem}
#list-map{width:100%;height:300px}
.cards-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cards-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.04em}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:1.25rem}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:12px 13px;cursor:pointer;transition:border-color 0.12s,transform 0.1s}
.card:hover{border-color:var(--color-border-primary);transform:translateY(-1px)}
.card-flag{font-size:20px;margin-bottom:4px}
.card-country{font-size:13px;font-weight:500}
.card-city{font-size:12px;color:var(--color-text-secondary)}
.card-cont{font-size:11px;font-weight:500;margin-top:4px}
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 0;border-top:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;gap:8px}
.ghost-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:13px;cursor:pointer;color:var(--color-text-secondary)}
.ghost-btn:hover{background:var(--color-background-secondary)}

/* ── 상세 뷰 ── */
.detail-view{padding:0}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 0;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border:none;background:none;margin-bottom:1rem}
.back-btn:hover{color:var(--color-text-primary)}
.back-arrow{font-size:16px;line-height:1}

/* 히어로 */
.hero{background:var(--color-background-secondary);border-radius:12px;border:0.5px solid var(--color-border-tertiary);padding:1.5rem;margin-bottom:1rem;display:flex;gap:1.25rem;align-items:flex-start;flex-wrap:wrap}
.hero-left{flex:1;min-width:200px}
.hero-flag{font-size:36px;margin-bottom:8px}
.hero-country{font-size:22px;font-weight:500;line-height:1.2}
.hero-city{font-size:15px;color:var(--color-text-secondary);margin-top:3px;margin-bottom:12px}
.hero-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:500}
.hero-meta{display:flex;flex-direction:column;gap:8px;min-width:160px}
.meta-item{display:flex;flex-direction:column;gap:2px}
.meta-label{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.04em;font-weight:500}
.meta-value{font-size:13px;font-weight:500}

/* 2단 레이아웃 */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.detail-grid.full{grid-template-columns:1fr}

/* 섹션 카드 */
.section-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:14px 16px}
.section-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-icon{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.desc-text{font-size:13px;color:var(--color-text-secondary);line-height:1.7}

/* 팁 */
.tips{display:flex;flex-direction:column;gap:8px}
.tip-item{display:flex;gap:10px;align-items:flex-start}
.tip-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75;flex-shrink:0;margin-top:4px}
.tip-text{font-size:13px;line-height:1.55}

/* 축제 카드 */
.festival-box{background:var(--color-background-secondary);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.festival-name{font-size:13px;font-weight:500;margin-bottom:2px}
.festival-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.55}

/* 날씨 바 */
.weather-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.weather-month{font-size:11px;color:var(--color-text-secondary);width:28px;flex-shrink:0}
.weather-bar-wrap{flex:1;background:var(--color-background-secondary);border-radius:4px;height:6px;overflow:hidden}
.weather-bar{height:100%;border-radius:4px;transition:width 0.4s}
.weather-temp{font-size:12px;color:var(--color-text-secondary);min-width:36px;text-align:right}

/* 미니맵 */
#detail-map{width:100%;height:180px;border-radius:8px}

/* 월 배지 */
.month-badges{display:flex;gap:5px;flex-wrap:wrap}
.mbadge{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.mbadge.best{background:#E1F5EE;color:#085041;border-color:#1D9E75;font-weight:500}

/* 인근 여행지 */
.nearby-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nearby-card{background:var(--color-background-secondary);border-radius:8px;padding:10px 12px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);transition:border-color 0.12s}
.nearby-card:hover{border-color:var(--color-border-primary)}
.nearby-flag{font-size:16px;margin-bottom:3px}
.nearby-name{font-size:12px;font-weight:500}
.nearby-cont{font-size:11px;color:var(--color-text-secondary)}
</style>

<!-- 리스트 뷰 -->
<div id="list-view" class="view active">
  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand">world<span>trip</span></div>

    <div class="filter-section">

</div>

<script>
const CONTINENTS=[
  {id:'전체',color:'#888780',dot:'#888780'},
  {id:'아시아',color:'#1D9E75',dot:'#1D9E75'},

const CONT_TAG={
  '아시아':{bg:'#E1F5EE',c:'#085041'},
  '유럽':{bg:'#EEEDFE',c:'#26215C'},
  '아메리카':{bg:'#FAEEDA',c:'#412402'},
  '오세아니아':{bg:'#E6F1FB',c:'#042C53'},
  '아프리카':{bg:'#FAECE7',c:'#4A1B0C'},
};
const TYPE_TAG={
  '자연':{bg:'#EAF3DE',c:'#27500A'},
  '축제':{bg:'#EEEDFE',c:'#3C3489'},
  '문화':{bg:'#E6F1FB',c:'#0C447C'},
  '해변':{bg:'#E1F5EE',c:'#085041'},
  '음식':{bg:'#FAEEDA',c:'#633806'},
  '액티비티':{bg:'#FAECE7',c:'#712B13'},
  '오로라':{bg:'#F1EFE8',c:'#444441'},
  '백야':{bg:'#F1EFE8',c:'#444441'},
  '사막':{bg:'#FAEEDA',c:'#633806'},
  '단풍':{bg:'#FAECE7',c:'#712B13'},
};
const MONTHS_KR=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const DESTINATIONS=[
  {id:'chiangmai',flag:'🇹🇭',country:'태국',city:'치앙마이',continent:'아시아',months:[1,2,12],types:['자연','문화','음식'],lat:18.79,lng:98.98,festival:'보쌍 우산 축제 (1월)',desc:'건기의 태국 북부 최고 시즌. 올드시티 성벽, 도이수텝 사원, 매림 코끼리 보호구역까지 다양한 볼거리가 있어요. 야시장과 열대 과일도 빼놓을 수 없어요.',tips:['평균 28°C, 강수 거의 없음','보쌍 마을 우산 축제 (1월 중순)','코끼리 보호소 당일 투어 추천','나이트 바자 & 썬데이 마켓 필수'],festivals:[{name:'보쌍 우산 축제',desc:'1월 중순, 치앙마이 근교 보쌍 마을에서 열리는 전통 우산 공예 축제. 화려한 색감의 우산과 퍼레이드.'},{name:'마까부차',desc:'음력 3월 보름, 사원마다 촛불 행렬이 이어지는 불교 축제.'}],weather:[{m:'11월',t:27,r:20},{m:'12월',t:25,r:10},{m:'1월',t:28,r:5},{m:'2월',t:31,r:10},{m:'3월',t:34,r:15}]},

  {id:'bali',flag:'🇮🇩',country:'인도네시아',city:'발리',continent:'아시아',months:[6,7,8,9],types:['해변','문화','자연'],lat:-8.34,lng:115.09,festival:'갈루간 힌두 축제',desc:'건기 발리는 최고의 시즌이에요. 우붓 라이스테라스, 울루와투 절벽 사원, 스미냑 해변에서 서핑까지. 힌두 문화와 자연이 공존하는 섬.',tips:['28°C, 건기라 비 없음','갈루간 축제 기간 현지 분위기 특별','우붓 아침 일찍 방문 추천','오토바이 렌탈로 이동 편리'],festivals:[{name:'갈루간',desc:'힌두 새해를 기념하는 축제. 각 마을마다 대나무 장식(펜조르)이 세워지고 사원 의식이 열려요.'},{name:'사라스와티',desc:'지식의 여신을 기리는 날. 책과 악기에 꽃을 바치고 학교·도서관에서 의식 진행.'}],weather:[{m:'5월',t:27,r:60},{m:'6월',t:26,r:40},{m:'7월',t:26,r:30},{m:'8월',t:26,r:25},{m:'9월',t:27,r:35}]},

let selMonth=new Date().getMonth()+1, selContinent='전체', listMap, detailMap, listMarkers, detailMarkerLayer;

function getFiltered(){
  return DESTINATIONS.filter(d=>{
    return d.months.includes(selMonth) && (selContinent==='전체'||d.continent===selContinent);
  });
}

function makeListIcon(continent){
  const c=CONT_ACCENT[continent]||'#888';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34"><path d="M13 0C5.82 0 0 5.82 0 13c0 8.66 13 21 13 21s13-12.34 13-21C26 5.82 20.18 0 13 0z" fill="${c}" stroke="white" stroke-width="1.5"/><circle cx="13" cy="13" r="4.5" fill="white" fill-opacity="0.9"/></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-36]});
}
function makeDetailIcon(continent){
  const c=CONT_ACCENT[continent]||'#888';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42"><path d="M16 0C7.16 0 0 7.16 0 16c0 10.67 16 26 16 26s16-15.33 16-26C32 7.16 24.84 0 16 0z" fill="${c}" stroke="white" stroke-width="2"/><circle cx="16" cy="16" r="6" fill="white" fill-opacity="0.95"/></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[32,42],iconAnchor:[16,42],popupAnchor:[0,-44]});
}

function initListMap(){
  listMap=L.map('list-map',{zoomControl:true,scrollWheelZoom:false}).setView([25,15],2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:18}).addTo(listMap);
  listMarkers=L.layerGroup().addTo(listMap);
}

function renderListMap(){
  listMarkers.clearLayers();
  getFiltered().forEach(d=>{
    const m=L.marker([d.lat,d.lng],{icon:makeListIcon(d.continent)});
    m.bindPopup(`<div style="font-size:13px;font-weight:500;color:#111;margin-bottom:2px">${d.flag} ${d.country} — ${d.city}</div><div style="font-size:12px;color:#555">${d.festival}</div>`,{maxWidth:200});
    m.on('click',()=>goDetail(d.id));
    listMarkers.addLayer(m);
  });
}

function buildMonthRow(){
  const el=document.getElementById('month-row');
  el.innerHTML=MONTHS_KR.map((m,i)=>{
    const n=i+1, cnt=DESTINATIONS.filter(d=>d.months.includes(n)).length;
    return `<button class="mchip${n===selMonth?' on':''}" onclick="pickMonth(${n})">${m} <span style="opacity:0.55;font-size:10px">${cnt}</span></button>`;
  }).join('');
}

function buildContRow(){
  const el=document.getElementById('cont-row');
  el.innerHTML=CONTINENTS.map(c=>{
    const cnt=c.id==='전체'
      ?DESTINATIONS.filter(d=>d.months.includes(selMonth)).length
      :DESTINATIONS.filter(d=>d.months.includes(selMonth)&&d.continent===c.id).length;
    if(c.id!=='전체'&&cnt===0) return '';
    return `<button class="chip${c.id===selContinent?' on':''}" data-c="${c.id}" onclick="pickContinent('${c.id}')"><span class="chip-dot" style="background:${c.dot}"></span>${c.id} <span style="opacity:0.5;font-size:10px">${cnt}</span></button>`;
  }).join('');
}

function renderCards(){
  const dests=getFiltered();
  document.getElementById('cards-title').textContent=`${dests.length}개 여행지 · ${selMonth}월`;
  const g=document.getElementById('cards-grid');
  if(dests.length===0){g.innerHTML=`<div style="grid-column:1/-1;padding:2rem;text-align:center;font-size:13px;color:var(--color-text-tertiary);background:var(--color-background-secondary);border-radius:12px">해당하는 여행지가 없어요</div>`;return;}
  g.innerHTML=dests.map(d=>`
    <div class="card" onclick="goDetail('${d.id}')">
      <div class="card-flag">${d.flag}</div>
      <div class="card-country">${d.country}</div>
      <div class="card-city">${d.city}</div>
      <div class="card-cont" style="color:${CONT_ACCENT[d.continent]||'#888'}">${d.continent}</div>
    </div>`).join('');
}

function updateStats(){
  const dests=getFiltered();
  document.getElementById('s-dest').textContent=dests.length;
  document.getElementById('s-fest').textContent=dests.filter(d=>d.festival).length;
  document.getElementById('s-cont').textContent=[...new Set(DESTINATIONS.filter(d=>d.months.includes(selMonth)).map(d=>d.continent))].length;
}

function pickMonth(m){
  selMonth=m; selContinent='전체';
  buildMonthRow(); buildContRow(); renderCards(); renderListMap(); updateStats();
  listMap.setView([25,15],2,{animate:true});
}

function pickContinent(c){
  selContinent=c;
  buildContRow(); renderCards(); renderListMap();
  const views={'아시아':[20,100,3],'유럽':[52,15,3],'아메리카':[5,-70,2],'오세아니아':[-25,135,3],'아프리카':[5,22,2],'전체':[25,15,2]};
  const v=views[c]||[25,15,2];
  listMap.setView([v[0],v[1]],v[2],{animate:true});
}

/* ── 상세 페이지 ── */
function goDetail(id){
  const d=DESTINATIONS.find(x=>x.id===id);
  if(!d) return;
  const accent=CONT_ACCENT[d.continent]||'#888';
  const ct=CONT_TAG[d.continent]||{bg:'#eee',c:'#333'};

  // 히어로
  document.getElementById('d-flag').textContent=d.flag;
  document.getElementById('d-country').textContent=d.country;
  document.getElementById('d-city').textContent=d.city;
  document.getElementById('d-continent').textContent=d.continent;
  document.getElementById('d-festival-short').textContent=d.festival;
  document.getElementById('d-accent-1').style.background=accent;
  document.getElementById('d-accent-2').style.background=accent;

  // 태그
  document.getElementById('d-tags').innerHTML=[
    ...d.types.map(t=>`<span class="tag" style="background:${(TYPE_TAG[t]||{bg:'#eee'}).bg};color:${(TYPE_TAG[t]||{c:'#333'}).c}">${t}</span>`),
    `<span class="tag" style="background:${ct.bg};color:${ct.c}">${d.continent}</span>`
  ].join('');

  // 추천 월 배지
  document.getElementById('d-months').innerHTML=MONTHS_KR.map((m,i)=>{
    const n=i+1, isBest=d.months.includes(n);
    return isBest?`<span class="mbadge best">${m}</span>`:'';
  }).join('');

  // 설명
  document.getElementById('d-desc').textContent=d.desc;

  // 팁
  document.getElementById('d-tips').innerHTML=d.tips.map(t=>`
    <div class="tip-item">
      <div class="tip-dot"></div>
      <span class="tip-text">${t}</span>
    </div>`).join('');

  // 축제
  document.getElementById('d-festivals').innerHTML=(d.festivals||[]).map(f=>`
    <div class="festival-box">
      <div class="festival-name">${f.name}</div>
      <div class="festival-desc">${f.desc}</div>
    </div>`).join('');

  // 날씨 바
  const maxT=Math.max(...(d.weather||[]).map(w=>w.t));
  document.getElementById('d-weather').innerHTML=(d.weather||[]).map(w=>{
    const pct=Math.round((w.t/maxT)*100);
    const col=w.t>=25?'#E8593C':w.t>=18?'#EF9F27':w.t>=10?'#378ADD':'#85B7EB';
    return `<div class="weather-row">
      <span class="weather-month">${w.m}</span>
      <div class="weather-bar-wrap"><div class="weather-bar" style="width:${pct}%;background:${col}"></div></div>
      <span class="weather-temp">${w.t}°C</span>
    </div>`;
  }).join('');

  // 인근 여행지
  const nearby=DESTINATIONS.filter(x=>x.continent===d.continent&&x.id!==d.id).slice(0,4);
  document.getElementById('d-nearby').innerHTML=nearby.length
    ?nearby.map(n=>`<div class="nearby-card" onclick="goDetail('${n.id}')"><div class="nearby-flag">${n.flag}</div><div class="nearby-name">${n.country} · ${n.city}</div><div class="nearby-cont">${n.months.map(m=>MONTHS_KR[m-1]).join(', ')}</div></div>`).join('')
    :`<div style="font-size:13px;color:var(--color-text-tertiary)">같은 대륙 여행지가 없어요</div>`;

  // 뷰 전환
  document.getElementById('list-view').classList.remove('active');
  document.getElementById('detail-view').classList.add('active');

  // 미니맵 (매번 새로 생성)
  setTimeout(()=>{
    const container=document.getElementById('detail-map');
    if(detailMap){detailMap.remove();detailMap=null;}
    container.innerHTML='';
    detailMap=L.map('detail-map',{zoomControl:true,scrollWheelZoom:false,dragging:false}).setView([d.lat,d.lng],6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:18}).addTo(detailMap);
    L.marker([d.lat,d.lng],{icon:makeDetailIcon(d.continent)}).addTo(detailMap)
      .bindPopup(`<b>${d.flag} ${d.city}</b>`).openPopup();
    setTimeout(()=>detailMap.invalidateSize(),100);
  },50);

  window.scrollTo(0,0);
}

function goList(){
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('list-view').classList.add('active');
  if(detailMap){detailMap.remove();detailMap=null;}

}
